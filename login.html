<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Smart Student Fee Management</title>
  <meta name="description" content="Secure admin login for Smart Student Fee Management System">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: var(--grad-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">🎓</div>
      <h1>Admin Login</h1>
      <p class="subtitle">Smart Student Fee Management System</p>

      <div id="errorMsg" class="error-msg hidden"></div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@yourinstitution.edu" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">
            <span>Password</span>
            <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a>
          </label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary btn-block btn-lg mt-2">🔐 Sign In</button>
      </form>

      <p class="mt-3" style="font-size:.8rem;color:var(--text-secondary);">Authorized administrators only</p>
    </div>
  </div>

  <script>
    /* ============================================================
       FIREBASE CONFIGURATION
       Replace with your Firebase project values from:
       Firebase Console → Project Settings → Your Apps → SDK setup
       ============================================================ */
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyC42tvDmM6hMlW8OAlGjWf9goIrdna5X60",
      authDomain:        "fee-3c417.firebaseapp.com",
      projectId:         "fee-3c417",
      storageBucket:     "fee-3c417.firebasestorage.app",
      messagingSenderId: "653640202868",
      appId:             "1:653640202868:web:7b8713168914feaffe6f21"
    };

    /* --- Firebase Init --- */
    let auth = null;
    window.isConfigured = false;
    (function(){
      try{
        if(!FIREBASE_CONFIG.apiKey||FIREBASE_CONFIG.apiKey==='YOUR_API_KEY'){
          console.log('Firebase not configured. Login will use demo mode.');
          return;
        }
        if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
        auth=firebase.auth();window.isConfigured=true;
        // Redirect if already logged in
        auth.onAuthStateChanged(user=>{if(user)window.location.href='admin.html';});
      }catch(e){console.warn('Firebase error:',e.message);}
    })();

    /* --- Login --- */
    async function handleLogin(e){
      e.preventDefault();
      const email=document.getElementById('email').value.trim();
      const pass=document.getElementById('password').value;
      const btn=document.getElementById('submitBtn');
      if(!email||!pass){showMsg('Please enter both email and password.','error');return false;}

      btn.disabled=true;btn.textContent='⌛ Signing in...';

      if(window.isConfigured){
        try{
          await auth.signInWithEmailAndPassword(email,pass);
          // Redirect handled by onAuthStateChanged
        }catch(err){
          showMsg(getFriendlyError(err.code),'error');
          btn.disabled=false;btn.textContent='🔐 Sign In';
        }
      } else {
        // Demo / localStorage mode — simple hardcoded check
        // Change these credentials or remove this block when using Firebase
        if(email==='admin@college.edu'&&pass==='admin123'){
          sessionStorage.setItem('admin_logged_in','1');
          window.location.href='admin.html';
        } else {
          showMsg('Invalid email or password.','error');
          btn.disabled=false;btn.textContent='🔐 Sign In';
        }
      }
      return false;
    }

    async function handleForgotPassword(e){
      e.preventDefault();
      const email=document.getElementById('email').value.trim();
      if(!email){showMsg('Please enter your admin email address first.','error');return;}
      if(!window.isConfigured){showMsg('Password reset requires Firebase to be configured.','error');return;}
      try{
        await auth.sendPasswordResetEmail(email);
        showMsg('✅ Password reset email sent. Please check your inbox.','success');
      }catch(err){showMsg('Could not send reset email. Please check the address.','error');}
    }

    function getFriendlyError(code){
      if(['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(code))return'Invalid email or password.';
      if(code==='auth/too-many-requests')return'Too many failed attempts. Please try again later.';
      return'Login failed. Please check your credentials.';
    }

    function showMsg(msg,type){
      const d=document.getElementById('errorMsg');
      d.textContent=msg;
      d.className='error-msg '+(type==='success'?'success-style':'error-style');
      d.classList.remove('hidden');
    }
  </script>
</body>
</html>
