<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Student Fee Management System</title>
  <meta name="description" content="Check your event fee payment status and pay online via UPI">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="style.css?v=2.4">
  <script src="script.js?v=2.4" defer></script>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon" style="background:#fff; color:var(--primary);">🎓</div>
      <h2 style="font-size: 1.2rem; font-weight: 800; margin-top: 12px;">Menu</h2>
    </div>
    <div class="sidebar-nav">
      <a href="index.html" class="sidebar-item active">🏠 Student Home</a>
      <a href="login.html" class="sidebar-item">🔐 Admin Login</a>
    </div>
  </div>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <nav class="navbar">
    <div class="brand">
      <button class="sidebar-toggle" onclick="window.toggleSidebar()">☰</button>
      <div class="logo-icon">🎓</div>
      <span class="brand-text">Smart Fee Manager</span>
      <span class="version-badge">v2.3</span>
    </div>
  </nav>

  <section class="hero">
    <div class="container">
      <h1 id="heroTitle">Student Fee Center</h1>
      <p id="heroSubtitle">Select an event below to check your status</p>
      
      <div id="searchContainer" class="hidden">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Enter Register Number..." aria-label="Register Number">
          <button onclick="searchStudent()" id="searchBtn">Search</button>
        </div>
        <p class="search-hint">💡 Enter your register number exactly as provided</p>
        <button class="btn btn-outline mt-3" onclick="backToEvents()" style="color:#fff; border-color:rgba(255,255,255,.3);">← Back to Event List</button>
      </div>
    </div>
  </section>

  <div class="page-wrapper">
    <div id="noticeBanner" class="notice-banner hidden">
      <span class="notice-icon">📢</span>
      <span class="notice-text" id="noticeText"></span>
    </div>

    <div id="eventsSection">
      <h2 class="section-title">🎪 Active Events</h2>
      <div id="eventsList" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
    </div>

    <div id="resultArea"></div>
    
    <div class="text-center mt-4" style="color:var(--text-secondary);font-size:.8rem;">
      <p>Smart Student Fee Management System by <strong>Janakiraman Kannan</strong> &copy; 2026</p>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="firebase-config.js"></script>
  <script src="script.js"></script>
  <script>
    /* --- Page Logic --- */
    let selectedEventId = null;

    async function initPage() {
      const events = await window.getEvents();
      const list = document.getElementById('eventsList');
      const active = events.filter(e => e.status === 'active');
      
      if (active.length > 0) {
        list.innerHTML = active.map(ev => `
          <div class="card glass-glow-card" onclick="selectEvent('${ev.id}')" style="cursor:pointer; background:#fff; border-left:8px solid var(--primary);">
            <div style="display:flex; align-items:center; gap:16px;">
              <div style="font-size:2.5rem; background:var(--surface-alt); width:64px; height:64px; display:flex; align-items:center; justify-content:center; border-radius:12px;">🎪</div>
              <div style="flex:1;">
                <h3 style="font-size:1.2rem; font-weight:800; color:var(--text); margin-bottom:4px;">${window.escapeHTML(ev.name)}</h3>
                <div style="display:flex; gap:12px; font-weight:700; font-size:.85rem;">
                  <span style="color:var(--primary);">${ev.date || 'TBA'}</span>
                  <span style="color:var(--text-secondary);">|</span>
                  <span style="color:var(--accent);">₹${ev.amount}</span>
                </div>
              </div>
              <div style="font-size:1.2rem; opacity:.3;">→</div>
            </div>
          </div>`).join('');
      } else {
        list.innerHTML = '<p class="text-center" style="grid-column:1/-1; color:var(--text-secondary); padding:40px;">No active events at the moment.</p>';
      }
      loadNotice();
    }

    function selectEvent(id) {
      selectedEventId = id;
      document.getElementById('eventsSection').classList.add('hidden');
      document.getElementById('searchContainer').classList.remove('hidden');
      document.getElementById('resultArea').innerHTML = '';
      
      // Update header
      window.getEvents().then(events => {
        const ev = events.find(e => e.id === id);
        if (ev) {
          document.getElementById('heroTitle').textContent = ev.name;
          document.getElementById('heroSubtitle').textContent = 'Enter your Register Number to check status';
        }
      });
      
      document.getElementById('searchInput').focus();
    }

    function backToEvents() {
      selectedEventId = null;
      document.getElementById('eventsSection').classList.remove('hidden');
      document.getElementById('searchContainer').classList.add('hidden');
      document.getElementById('resultArea').innerHTML = '';
      document.getElementById('heroTitle').textContent = 'Student Fee Center';
      document.getElementById('heroSubtitle').textContent = 'Select an event below to check your status';
      document.getElementById('searchInput').value = '';
    }

    async function loadNotice() {
      const n = await window.getNotice();
      if (n && n.trim()) {
        document.getElementById('noticeBanner').classList.remove('hidden');
        document.getElementById('noticeText').textContent = n;
      }
    }

    async function searchStudent() {
      if (!selectedEventId) return;
      
      const rawReg = document.getElementById('searchInput').value.trim();
      const regNo = window.sanitize(rawReg).toUpperCase();
      const resultArea = document.getElementById('resultArea');
      
      if (!regNo) {
        window.showToast('Please enter a Register Number', 'warning');
        return;
      }
      
      const btn = document.getElementById('searchBtn');
      btn.textContent = '⏳ ...';
      btn.disabled = true;
      
      const students = await window.getStudents();
      const student = students.find(s => (s.reg ? String(s.reg).toUpperCase() : '') === regNo);
      
      btn.textContent = 'Search';
      btn.disabled = false;
      
      if (!student) {
        resultArea.innerHTML = `
          <div class="result-card">
            <div class="result-header" style="background:var(--danger);"><h2>❌ Not Found</h2></div>
            <div class="result-body text-center" style="padding:32px;">
              <p>No record found for: <strong>${window.escapeHTML(regNo)}</strong></p>
              <p style="color:var(--text-secondary); font-size:.85rem; margin-top:8px;">Please check your register number or contact the admin.</p>
            </div>
          </div>`;
        return;
      }
      
      const events = await window.getEvents();
      const ev = events.find(e => e.id === selectedEventId);
      
      if (!ev) {
        window.showToast('Event no longer active', 'error');
        backToEvents();
        return;
      }

      const payments = await window.getPayments(ev.id);
      const pay = payments[student.reg.toUpperCase()] || {};
      let statusBadge, payButton;
      
      if (pay.paid) {
        statusBadge = '<span class="badge badge-paid">✅ Paid</span>';
        payButton = '<button class="btn btn-success btn-block" disabled>✅ Payment Completed</button>';
      } else if (pay.method === 'cash_pending') {
        const adminName = await window.getAdminName();
        statusBadge = '<span class="badge badge-pending">⏳ Cash Pending</span>';
        payButton = `<button class="btn btn-warning btn-block" disabled>⏳ Cash Payment Pending — See ${adminName}</button>`;
      } else {
        statusBadge = '<span class="badge badge-unpaid">❌ Unpaid</span>';
        const upiRaw = ev.upiId || ev.upi || '';
        const upiId = /^\d{10}$/.test(upiRaw) ? upiRaw + '@upi' : upiRaw;
        payButton = `
          <div style="display:grid; gap:12px;">
            <a href="upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(ev.name)}&am=${ev.amount}&cu=INR" class="btn btn-primary btn-block glass-glow-card" style="padding:16px; font-size:1rem;">💳 Pay Online — ₹${ev.amount}</a>
            <button class="btn btn-outline btn-block" onclick="requestCashPayment('${window.escapeHTML(student.reg)}','${window.escapeHTML(ev.id)}')" style="padding:12px;">💵 Pay by Cash</button>
          </div>`;
      }
      
      resultArea.innerHTML = `
        <div class="container">
          <div class="card glass-glow-card" style="margin-bottom:32px; border-left:8px solid var(--primary); background:#fff; box-shadow:var(--shadow-lg);">
            <div style="display:flex; align-items:center; gap:20px; padding:10px 5px;">
              <div style="font-size:3rem; background:var(--surface-alt); width:80px; height:80px; display:flex; align-items:center; justify-content:center; border-radius:12px; border:2px solid var(--border);">⛹️</div>
              <div>
                <h2 style="font-size:1.6rem; font-weight:900; color:var(--text); margin-bottom:4px; text-transform:uppercase; letter-spacing:-0.5px;">${window.escapeHTML(student.name)}</h2>
                <p style="font-size:.95rem; font-weight:700; color:var(--primary); display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                  <span style="opacity:.7;">Reg:</span>${window.escapeHTML(student.reg)}
                  ${student.department ? `<span style="opacity:.3; font-weight:300;">|</span><span style="color:var(--accent);">${window.escapeHTML(student.department)}</span>` : ''}
                </p>
              </div>
            </div>
          </div>

          <div class="result-card glass-glow-card" style="margin-top:0; margin-bottom:24px;">
            <div class="result-header" style="padding:20px; text-align:left; background:var(--primary);">
              <h3 style="font-size:1.1rem; color:#fff;">🎪 Current Status</h3>
            </div>
            <div class="result-body">
              <div class="info-row"><span class="label">Fee Amount</span><span class="value">₹${ev.amount}</span></div>
              <div class="info-row"><span class="label">Status</span><span class="value">${statusBadge}</span></div>
            </div>
            <div class="result-footer">${payButton}</div>
          </div>
        </div>`;
      
      resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    async function requestCashPayment(regNo, eventId) {
      if (!regNo || !eventId) return;
      const phoneInput = prompt('Please enter your 10-digit Mobile Number for Cash Payment:');
      if (phoneInput === null) return;
      
      const phone = window.sanitize(phoneInput.trim());
      if (!/^\d{10}$/.test(phone)) {
        window.showToast('Please enter a valid 10-digit phone number.', 'error');
        return;
      }
      
      const events = await window.getEvents();
      const ev = events.find(e => e.id === eventId);
      const paymentData = {
        paid: false,
        method: 'cash_pending',
        amount: Number(ev.amount),
        phone: phone, 
        timestamp: Date.now()
      };
      
      await window.savePayment(eventId, regNo, paymentData);
      const adminName = await window.getAdminName();
      window.showToast(`Cash request recorded. Please pay ${adminName}.`, 'success');
      searchStudent();
    }

    // Event Listeners
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchStudent();
    });

    // Start
    initPage();
  </script>
</body>
</html>
</body>
</html>
